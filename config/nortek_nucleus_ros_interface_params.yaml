/**:
  ros__parameters:
    frame_id: nucleus_frame

    connection_params:
      remote_ip: "192.168.1.100"
      data_remote_port: 9000
      password: ""

    # Enable/disable publishers
    enable_imu: true
    enable_dvl: true
    enable_pressure: true
    enable_magnetometer: true

    # Topic names
    imu_data_raw_pub_topic: imu/data_raw
    imu_data_pub_topic: imu/data
    dvl_pub_topic: nucleus/dvl
    pressure_pub_topic: nucleus/pressure
    magnetometer_pub_topic: imu/mag

    # IMU settings
    imu_settings:
      freq: 125  # Hz

    # AHRS settings (provides orientation quaternion for IMU msg)
    ahrs_settings:
      freq: 10   # Hz
      mode: 0    # 0=FixedHardAndSoftIron, 1=HardIronEstimation, 2=HardAndSoftEstimation

    # Bottom track (DVL) settings
    bottom_track_settings:
      mode: 2              # 0=FastACQ, 1=Crawler, 2=Auto
      velocity_range: 5    # m/s
      enable_watertrack: false

    # Fast pressure settings
    fast_pressure_settings:
      enable: true
      sampling_rate: 16    # Hz

    # Magnetometer settings
    magnetometer_settings:
      freq: 75             # Hz
      mode: 0              # 0=Auto, 1=Off, 2=Wmm
