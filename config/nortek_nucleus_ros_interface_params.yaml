/**:
  ros__parameters:
    frame_id: nucleus_frame

    connection_params:
      remote_ip: "10.0.0.42"
      data_remote_port: 9000
      password: ""

    # Enable/disable publishers
    enable_imu: true
    enable_ins_odom: true
    enable_dvl: true
    enable_pressure: true
    enable_magnetometer: true
    enable_ins_twist: true
    enable_ins_position: true
    enable_ins_pose: true

    # Topic names
    imu_data_raw_pub_topic: imu/data_raw
    imu_data_pub_topic: imu/data
    ins_pub_topic: nucleus/odom
    dvl_pub_topic: nucleus/dvl
    pressure_pub_topic: nucleus/pressure
    magnetometer_pub_topic: imu/mag
    ins_twist_pub_topic: nucleus/ins/twist
    ins_position_pub_topic: nucleus/ins/position
    ins_pose_pub_topic: nucleus/ins/pose

    # IMU settings
    imu_settings:
      freq: 125  # Hz

    # AHRS settings (provides orientation quaternion for IMU msg)
    ahrs_settings:
      freq: 10   # Hz
      mode: 0    # 0=FixedHardAndSoftIron, 1=HardIronEstimation, 2=HardAndSoftEstimation

    # Bottom track (DVL) settings
    bottom_track_settings:
      mode: 2              # 0=FastACQ, 1=Crawler, 2=Auto
      velocity_range: 5    # m/s
      enable_watertrack: false

    # Fast pressure settings
    fast_pressure_settings:
      enable: true
      sampling_rate: 16    # Hz

    # Magnetometer settings
    magnetometer_settings:
      freq: 75             # Hz
      mode: 0              # 0=Auto, 1=Off, 2=Wmm

    # Instrument mounting alignment (SETINST) — rotation from VEHICLE to Nucleus [deg, -180..180]
    # ROTXY = yaw offset (rotation about z-axis). Use 180.0 if instrument is mounted 180° flipped in yaw.
    # Settings are written to device and saved persistently (SAVE,CONFIG) on each startup.
    instrument_settings:
      rotxy: 180.0   # yaw/heading alignment offset
      rotyz: 0.0     # roll alignment offset
      rotxz: 0.0     # pitch alignment offset
